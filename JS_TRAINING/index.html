      //PUSH, POP, SLICE, SPLICE, FILTER, FIND, REDUCE

      // PUSH - adds element at the end
      const fruits = ["apple", "mango"];
      fruits.push("banana");
      console.log(fruits);

      // POP - removes last element
      fruits.pop();
      console.log(fruits);

      // SLICE - copies part of array (does NOT change original)
      const result = fruits.slice(1, 3);

      console.log(result);
      console.log(fruits);

      // SPLICE - modifies original array
      // remove 1 item from index 1 and add "kiwi"
      const removed = fruits.splice(1, 1, "kiwi");

      console.log(removed);
      console.log(fruits);

      // FILTER - returns new array based on condition
      const numbers = [1, 2, 3, 4, 5];
      const even = numbers.filter((num) => num % 2 === 0);
      console.log(even);

      // FIND - returns first matching element
      const found = numbers.find((num) => num > 3);
      console.log(found);

      // REDUCE - reduces array to single value
      const sum = numbers.reduce((acc, curr) => {
        return acc + curr;
      }, 0);
      console.log(sum);
      
    </script>
